plugin_spec_version: v2
extension: plugin
products: [insightconnect]
name: halo_itsm
title: Halo ITSM
description: Halo ITSM is a cloud-based IT Service Management platform that provides
  ticket management, asset tracking, and service desk capabilities
version: 1.0.0
connection_version: 1
supported_versions: ["2025-07-10"]
vendor: rapid7_custom
support: rapid7
cloud_ready: false
status: []
resources:
  source_url: https://github.com/rapid7/insightconnect-plugins/tree/master/plugins/halo_itsm
  license_url: https://github.com/rapid7/insightconnect-plugins/blob/master/LICENSE
  vendor_url: https://haloitsm.com
tags:
  - halo_itsm
  - ticketing
  - itsm
hub_tags:
  use_cases: [remediation_management]
  keywords: [ticketing]
  features: []
links:
  - '[Halo ITSM](https://haloitsm.com)'
references:
  - '[Halo ITSM API Guide](https://haloitsm.com/guides/article/?kbid=929)'
key_features:
  - Create, update, delete, and get tickets
  - List tickets with filtering support
  - Add actions (notes/comments) to tickets
  - Manage ticket assignments and status changes
requirements:
  - Halo ITSM API Client ID and Client Secret
  - Base URL of your Halo ITSM instance
  - API application configured with Client Credentials grant type in Halo ITSM
version_history:
  - "1.0.0 - Initial plugin release with Create, Get, Update, Delete, List Tickets, Add Action, and Attach File actions"
sdk:
  type: full
  version: 6.6.0
  user: nobody
types:
  ticket:
    id:
      title: ID
      description: Unique ID of the ticket
      type: integer
      required: false
      example: 1234
    summary:
      title: Summary
      description: Summary of the ticket
      type: string
      required: false
      example: Server is unresponsive
    details:
      title: Details
      description: Details of the ticket
      type: string
      required: false
      example: The production server has been unresponsive since 10:00 AM
    status_id:
      title: Status ID
      description: ID of the ticket status
      type: integer
      required: false
      example: 1
    priority_id:
      title: Priority ID
      description: ID of the ticket priority
      type: integer
      required: false
      example: 3
    tickettype_id:
      title: Ticket Type ID
      description: ID of the ticket type
      type: integer
      required: false
      example: 1
    category_1:
      title: Category
      description: Primary category of the ticket
      type: string
      required: false
      example: Hardware
    category_2:
      title: Subcategory
      description: Subcategory of the ticket
      type: string
      required: false
      example: Server
    impact:
      title: Impact
      description: Impact level of the ticket
      type: string
      required: false
      example: Medium
    urgency:
      title: Urgency
      description: Urgency level of the ticket
      type: string
      required: false
      example: High
    user_id:
      title: User ID
      description: ID of the user who raised the ticket
      type: integer
      required: false
      example: 10
    user_name:
      title: User Name
      description: Name of the user who raised the ticket
      type: string
      required: false
      example: Jane Doe
    agent_id:
      title: Agent ID
      description: ID of the agent assigned to the ticket
      type: integer
      required: false
      example: 15
    agent_name:
      title: Agent Name
      description: Name of the agent assigned to the ticket
      type: string
      required: false
      example: John Smith
    team:
      title: Team
      description: Team assigned to the ticket
      type: string
      required: false
      example: IT Support
    dateoccurred:
      title: Date Occurred
      description: Date when the ticket was raised
      type: string
      required: false
      example: 2025-07-10T10:00:00Z
    datecreated:
      title: Date Created
      description: Timestamp when the ticket was created
      type: string
      required: false
      example: 2025-07-10T10:05:00Z
    lastupdate:
      title: Last Update
      description: Timestamp of the last update on the ticket
      type: string
      required: false
      example: 2025-07-10T11:30:00Z
    closeddate:
      title: Closed Date
      description: Timestamp when the ticket was closed
      type: string
      required: false
      example: 2025-07-11T09:00:00Z
    client_id:
      title: Client ID
      description: ID of the client associated with the ticket
      type: integer
      required: false
      example: 5
    client_name:
      title: Client Name
      description: Name of the client associated with the ticket
      type: string
      required: false
      example: ACME Corp
    site_id:
      title: Site ID
      description: ID of the site associated with the ticket
      type: integer
      required: false
      example: 2
    sla_id:
      title: SLA ID
      description: ID of the SLA applied to the ticket
      type: integer
      required: false
      example: 1
  ticket_action:
    id:
      title: ID
      description: Unique ID of the action
      type: integer
      required: false
      example: 501
    ticket_id:
      title: Ticket ID
      description: ID of the ticket this action belongs to
      type: integer
      required: false
      example: 1234
    who:
      title: Who
      description: Name of the person who performed the action
      type: string
      required: false
      example: John Smith
    note:
      title: Note
      description: Content of the action note
      type: string
      required: false
      example: Investigated the issue and found root cause
    hiddenfromuser:
      title: Hidden from User
      description: Whether the action is hidden from the end user
      type: boolean
      required: false
      example: false
    outcome:
      title: Outcome
      description: Outcome of the action
      type: string
      required: false
      example: Ongoing
    actiondate:
      title: Action Date
      description: Timestamp of the action
      type: string
      required: false
      example: 2025-07-10T10:30:00Z
connection:
  base_url:
    title: Base URL
    description: Base URL of your Halo ITSM instance (e.g. https://your-instance.haloitsm.com)
    type: string
    required: true
    example: https://example.haloitsm.com
  client_id:
    title: Client ID
    description: OAuth Client ID for the Halo ITSM API application
    type: string
    required: true
    example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
  client_secret:
    title: Client Secret
    description: OAuth Client Secret for the Halo ITSM API application
    type: credential_secret_key
    required: true
    example: '{"secretKey": "a1b2c3d4-e5f6-7890-abcd-ef1234567890"}'
  tenant:
    title: Tenant
    description: Tenant name for multi-tenant Halo ITSM instances (optional, leave
      blank if not applicable)
    type: string
    required: false
    example: my-tenant
actions:
  create_ticket:
    title: Create Ticket
    description: Create a new ticket in Halo ITSM
    input:
      summary:
        title: Summary
        description: Summary of the ticket
        type: string
        required: true
        example: Server is unresponsive
      details:
        title: Details
        description: Full details of the ticket in plain text or HTML
        type: string
        required: false
        example: The production server has been unresponsive since 10:00 AM
      tickettype_id:
        title: Ticket Type ID
        description: ID of the ticket type (e.g. 1 for Incident, 2 for Service Request)
        type: integer
        required: true
        example: 1
      user_id:
        title: User ID
        description: ID of the user raising the ticket
        type: integer
        required: false
        example: 10
      client_id:
        title: Client ID
        description: ID of the client associated with the ticket
        type: integer
        required: false
        example: 5
      priority_id:
        title: Priority ID
        description: ID of the ticket priority
        type: integer
        required: false
        example: 3
      status_id:
        title: Status ID
        description: ID of the initial status for the ticket
        type: integer
        required: false
        example: 1
      category_1:
        title: Category
        description: Primary category of the ticket
        type: string
        required: false
        example: Hardware
      category_2:
        title: Subcategory
        description: Subcategory of the ticket
        type: string
        required: false
        example: Laptop
      agent_id:
        title: Agent ID
        description: ID of the agent to assign the ticket to
        type: integer
        required: false
        example: 15
      impact:
        title: Impact
        description: Impact level of the ticket
        type: string
        required: false
        example: Medium
      urgency:
        title: Urgency
        description: Urgency level of the ticket
        type: string
        required: false
        example: High
      site_id:
        title: Site ID
        description: ID of the site to associate with the ticket
        type: integer
        required: false
        example: 2
    output:
      ticket:
        title: Ticket
        description: The newly created ticket
        type: ticket
        required: true
        example: '{"id":101,"summary":"Server is unresponsive","details":"The production server has been unresponsive since 10:00 AM","status_id":1,"priority_id":3,"tickettype_id":1,"category_1":"Hardware","category_2":"Server","impact":"Medium","urgency":"High","user_id":10,"user_name":"Jane Doe","agent_id":15,"agent_name":"John Smith","team":"IT Support","dateoccurred":"2025-07-10T10:00:00Z","datecreated":"2025-07-10T10:05:00Z","lastupdate":"2025-07-10T10:05:00Z","closeddate":null,"client_id":5,"client_name":"ACME Corp","site_id":2,"sla_id":1}'
  get_ticket:
    title: Get Ticket
    description: Get details of a specific ticket by ID
    input:
      ticket_id:
        title: Ticket ID
        description: ID of the ticket to retrieve
        type: integer
        required: true
        example: 1234
    output:
      ticket:
        title: Ticket
        description: The ticket details
        type: ticket
        required: true
        example: '{"id":1234,"summary":"Email not working","details":"User reports email client is not connecting to server","status_id":2,"priority_id":2,"tickettype_id":1,"category_1":"Software","category_2":"Email","impact":"High","urgency":"High","user_id":20,"user_name":"Jane Doe","agent_id":15,"agent_name":"John Smith","team":"IT Support","dateoccurred":"2025-07-09T14:00:00Z","datecreated":"2025-07-09T14:05:00Z","lastupdate":"2025-07-10T08:30:00Z","closeddate":null,"client_id":5,"client_name":"ACME Corp","site_id":1,"sla_id":2}'
  update_ticket:
    title: Update Ticket
    description: Update an existing ticket in Halo ITSM
    input:
      ticket_id:
        title: Ticket ID
        description: ID of the ticket to update
        type: integer
        required: true
        example: 1234
      summary:
        title: Summary
        description: Updated summary of the ticket
        type: string
        required: false
        example: Updated summary
      details:
        title: Details
        description: Updated details of the ticket
        type: string
        required: false
        example: Updated details text
      status_id:
        title: Status ID
        description: Updated status ID for the ticket
        type: integer
        required: false
        example: 2
      priority_id:
        title: Priority ID
        description: Updated priority ID for the ticket
        type: integer
        required: false
        example: 1
      agent_id:
        title: Agent ID
        description: Updated agent ID to assign the ticket to
        type: integer
        required: false
        example: 15
      category_1:
        title: Category
        description: Updated primary category
        type: string
        required: false
        example: Software
      category_2:
        title: Subcategory
        description: Updated subcategory
        type: string
        required: false
        example: Operating System
      impact:
        title: Impact
        description: Updated impact level
        type: string
        required: false
        example: High
      urgency:
        title: Urgency
        description: Updated urgency level
        type: string
        required: false
        example: Critical
    output:
      ticket:
        title: Ticket
        description: The updated ticket
        type: ticket
        required: true
        example: '{"id":1234,"summary":"Email not working - UPDATED","details":"User reports email client is not connecting to server. Investigating.","status_id":3,"priority_id":1,"tickettype_id":1,"category_1":"Software","category_2":"Email","impact":"High","urgency":"Critical","user_id":20,"user_name":"Jane Doe","agent_id":15,"agent_name":"John Smith","team":"IT Support","dateoccurred":"2025-07-09T14:00:00Z","datecreated":"2025-07-09T14:05:00Z","lastupdate":"2025-07-10T09:00:00Z","closeddate":null,"client_id":5,"client_name":"ACME Corp","site_id":1,"sla_id":2}'
  delete_ticket:
    title: Delete Ticket
    description: Delete a ticket from Halo ITSM
    input:
      ticket_id:
        title: Ticket ID
        description: ID of the ticket to delete
        type: integer
        required: true
        example: 1234
    output:
      success:
        title: Success
        description: Whether the ticket was successfully deleted
        type: boolean
        required: true
        example: true
  list_tickets:
    title: List Tickets
    description: List tickets from Halo ITSM with optional filtering
    input:
      status_id:
        title: Status ID
        description: Filter tickets by status ID
        type: integer
        required: false
        example: 1
      tickettype_id:
        title: Ticket Type ID
        description: Filter tickets by ticket type ID
        type: integer
        required: false
        example: 1
      agent_id:
        title: Agent ID
        description: Filter tickets by assigned agent ID
        type: integer
        required: false
        example: 15
      client_id:
        title: Client ID
        description: Filter tickets by client ID
        type: integer
        required: false
        example: 5
      count:
        title: Count
        description: Maximum number of tickets to return
        type: integer
        required: false
        default: 50
        example: 50
      search:
        title: Search
        description: Search string to filter tickets
        type: string
        required: false
        example: server down
        placeholder: Enter search term
    output:
      tickets:
        title: Tickets
        description: List of tickets matching the filter criteria
        type: '[]ticket'
        required: true
        example: '[{"id":1234,"summary":"Email not working","status_id":2,"priority_id":2,"tickettype_id":1,"category_1":"Software","agent_id":15,"agent_name":"John Smith","client_name":"ACME Corp"},{"id":1235,"summary":"Printer jam on 3rd floor","status_id":1,"priority_id":4,"tickettype_id":1,"category_1":"Hardware","agent_id":null,"agent_name":null,"client_name":"ACME Corp"}]'
  add_action_to_ticket:
    title: Add Action to Ticket
    description: Add an action (note, comment, or update) to an existing ticket
    input:
      ticket_id:
        title: Ticket ID
        description: ID of the ticket to add the action to
        type: integer
        required: true
        example: 1234
      note:
        title: Note
        description: Content of the action note in plain text or HTML
        type: string
        required: true
        example: Investigated the issue and found root cause
      outcome:
        title: Outcome
        description: Outcome of the action
        type: string
        required: false
        example: Ongoing
      hiddenfromuser:
        title: Hidden from User
        description: Whether this note should be hidden from the end user
        type: boolean
        required: false
        default: false
        example: false
    output:
      action:
        title: Action
        description: The newly created action
        type: ticket_action
        required: true
        example: '{"id":501,"ticket_id":1234,"who":"John Smith","note":"Investigated the issue and found root cause","hiddenfromuser":false,"outcome":"Ongoing","actiondate":"2025-07-10T10:30:00Z"}'
  attach_file_to_ticket:
    title: Attach File to Ticket
    description: Attach a file to an existing ticket via an action note
    input:
      ticket_id:
        title: Ticket ID
        description: ID of the ticket to attach the file to
        type: integer
        required: true
        example: 1234
      filename:
        title: Filename
        description: Name of the file to attach (e.g. screenshot.png)
        type: string
        required: true
        example: error_log.txt
      content:
        title: Content
        description: Base64-encoded content of the file to attach
        type: bytes
        required: true
        example: VGhpcyBpcyBhIHRlc3QgZmlsZQ==
      note:
        title: Note
        description: Optional note to include with the attachment
        type: string
        required: false
        example: Attaching error log for reference
      hiddenfromuser:
        title: Hidden from User
        description: Whether the attachment action should be hidden from the end user
        type: boolean
        required: false
        default: false
        example: false
    output:
      action:
        title: Action
        description: The action created with the attachment
        type: ticket_action
        required: true
        example: '{"id":502,"ticket_id":1234,"who":"John Smith","note":"Attaching error log for reference","hiddenfromuser":false,"outcome":null,"actiondate":"2025-07-10T11:00:00Z"}'
